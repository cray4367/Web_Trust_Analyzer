server {
    listen 80;

    # Use Docker's internal DNS resolver.
    # The 'valid=10s' forces re-resolution every 10 seconds so the firewall
    # hostname resolves correctly even if the container starts after us.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the Go firewall.
    # Using a variable for proxy_pass defers DNS resolution to request time,
    # which avoids the "host not found in upstream" startup failure.
    location /api/ {
        set $firewall_upstream http://firewall:8080;
        proxy_pass          $firewall_upstream/api/;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  30s;
    }
}
