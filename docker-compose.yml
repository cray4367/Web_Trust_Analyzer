version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
#  Web Trust Analyzer — Simple / Dev Compose (no Nginx)
#  Run from: Web_Trust_Analyzer/
#
#  ACCESS POINTS:
#    Resume site  →  http://localhost:8080/   (through the WAF firewall)
#    Dashboard    →  http://localhost:3001/
#
#  On your WiFi from a phone or other device use your machine IP instead:
#    Resume site  →  http://10.203.69.228:8080/
#    Dashboard    →  http://10.203.69.228:3001/
# ─────────────────────────────────────────────────────────────────────────────

networks:
  waf_net:
    driver: bridge

volumes:
  redis_data:


services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - waf_net

  # ── Go Firewall (WAF + reverse proxy) ──────────────────────────────────────
  # This is the ONLY entry point for the resume site.
  # Access the resume at http://localhost:8080/ or http://10.203.69.228:8080/
  firewall:
    build:
      context: ./firewall
    restart: always
    ports:
      - "8080:8080" # host-exposed: resume + API both live here
    environment:
      - PORT=8080
      - TARGET_URL=http://react-resume:3000
      - REDIS_URL=redis://redis:6379
      # Set WAF_API_KEY here or in a .env file to protect the /api/* routes
      # - WAF_API_KEY=change-me
    volumes:
      - ./firewall/firewall.db:/app/firewall.db
    networks:
      - waf_net
    depends_on:
      - react-resume
      - redis

  # ── Dashboard (monitoring UI) ──────────────────────────────────────────────
  # Access at http://localhost:3001/ or http://10.203.69.228:3001/
  # VITE_API_URL must point to the firewall's browser-reachable address.
  # Using localhost:8080 here because the built JS runs in the BROWSER,
  # not inside Docker — so it needs the host-side port.
  dashboard:
    build:
      context: ./dashboard
      args:
        - VITE_API_URL=http://localhost:8080
        - VITE_TARGET_URL=http://localhost:8080
    restart: always
    ports:
      - "3001:80" # host-exposed: dashboard UI
    networks:
      - waf_net
    depends_on:
      - firewall

  # ── React Resume (the protected target) ────────────────────────────────────
  # NOT exposed to the host. The only way to reach it is through the firewall.
  # Accessing http://localhost:3000/ directly is intentionally blocked.
  react-resume:
    build:
      context: ../React_resume
    restart: always
    expose:
      - "3000" # internal only — go through :8080 (the WAF)
    networks:
      - waf_net
