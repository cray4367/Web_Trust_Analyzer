version: '3.8'

services:
  firewall:
    build:
      context: ./firewall
    ports:
      - "8080:8080"
    environment:
      - TARGET_URL=http://react-resume:3000
    volumes:
      - ./firewall/firewall.db:/app/firewall.db
    depends_on:
      - react-resume
    restart: always

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3001:80"
    depends_on:
      - firewall
    restart: always

  react-resume:
    build:
      context: ../React_resume
    ports:
      - "3000:3000"
    restart: always
